name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v0.1.0.
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set release version
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ -n "${INPUT_TAG}" ]]; then
            tag="${INPUT_TAG}"
          fi
          echo "TAG_NAME=${tag}" >> "$GITHUB_ENV"
          echo "VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build DMG
        run: VERSION="${VERSION}" mcp-center/packaging/macos/package-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SupperIdaMcpCenter-${{ env.VERSION }}-osx-arm64
          path: artifacts/macos/SupperIdaMcpCenter-${{ env.VERSION }}-osx-arm64.dmg
          if-no-files-found: error

  windows:
    name: Windows portable ZIP
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set release version
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ -n "${INPUT_TAG}" ]]; then
            tag="${INPUT_TAG}"
          fi
          echo "TAG_NAME=${tag}" >> "$GITHUB_ENV"
          echo "VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build portable ZIP
        shell: pwsh
        run: .\mcp-center\packaging\windows\package-zip.ps1 -Version "${{ env.VERSION }}"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: SupperIdaMcpCenter-${{ env.VERSION }}-win-x64
          path: artifacts/windows/SupperIdaMcpCenter-${{ env.VERSION }}-win-x64.zip
          if-no-files-found: error

  publish:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows

    steps:
      - name: Resolve release tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ -n "${INPUT_TAG}" ]]; then
            tag="${INPUT_TAG}"
          fi
          echo "TAG_NAME=${tag}" >> "$GITHUB_ENV"

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create or update draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find dist -type f | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release artifacts found." >&2
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${files[@]}" --clobber
          else
            gh release create "${TAG_NAME}" "${files[@]}" \
              --draft \
              --title "Supper IDA MCP Tools ${TAG_NAME}" \
              --generate-notes
          fi
